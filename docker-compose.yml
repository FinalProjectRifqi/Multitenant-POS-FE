# =============================================================================
# docker-compose.yml — Multitenant POS Frontend (Production)
# =============================================================================

name: multitenant-pos-fe

networks:
  proxy:
    external: true
  pos-network:
    external: true

services:
  frontend:
    image: multitenant-pos-fe:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* baked ke JS bundle saat build time.
        NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-real}
        NEXT_PUBLIC_INVENTARIS_MODE: ${NEXT_PUBLIC_INVENTARIS_MODE:-real}
    restart: unless-stopped
    networks:
      - proxy
      - pos-network
    expose:
      - "${FE_PORT:-3000}"
    environment:
      NODE_ENV: production
      PORT: ${FE_PORT:-3000}

      # ── NextAuth v5 ──────────────────────────────────────────────────────
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}

      # ── Backend API ──────────────────────────────────────────────────────
      # FE reach BE via pos-network (internal Docker network).
      # "backend" adalah nama service di docker-compose.yml repo multitenant-pos-be.
      API_BASE_URL: ${API_BASE_URL:-http://backend:3004}

      # ── Feature flags (server-side runtime) ─────────────────────────────
      NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-real}
      NEXT_PUBLIC_INVENTARIS_MODE: ${NEXT_PUBLIC_INVENTARIS_MODE:-real}

    labels:
      - "traefik.enable=true"
      # Beritahu Traefik pakai network "proxy" (bukan pos-network)
      - "traefik.docker.network=proxy"

      # ── HTTP Router → redirect ke HTTPS ──────────────────────────────────
      - "traefik.http.routers.multitenant-pos-fe.entrypoints=http"
      - "traefik.http.routers.multitenant-pos-fe.rule=Host(`${DOMAIN_FE}`)"
      - "traefik.http.routers.multitenant-pos-fe.middlewares=multitenant-pos-fe-https-redirect"

      # ── HTTPS Router (TLS) ────────────────────────────────────────────────
      - "traefik.http.routers.multitenant-pos-fe-secure.entrypoints=https"
      - "traefik.http.routers.multitenant-pos-fe-secure.rule=Host(`${DOMAIN_FE}`)"
      - "traefik.http.routers.multitenant-pos-fe-secure.tls=true"
      - "traefik.http.routers.multitenant-pos-fe-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER:-cloudflare}"
      - "traefik.http.routers.multitenant-pos-fe-secure.service=multitenant-pos-fe"

      # ── Service: port yang Traefik forward ───────────────────────────────
      - "traefik.http.services.multitenant-pos-fe.loadbalancer.server.port=${FE_PORT:-3000}"

      # ── Middleware: HTTP → HTTPS permanent redirect ───────────────────────
      - "traefik.http.middlewares.multitenant-pos-fe-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.multitenant-pos-fe-https-redirect.redirectscheme.permanent=true"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${FE_PORT:-3000}/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

    # ── Loki logging ─────────────────────────────────────────────────────────
    # Uncomment setelah install plugin loki-docker-driver.
    # logging:
    #   driver: loki
    #   options:
    #     loki-url: "${LOKI_URL}/loki/api/v1/push"
    #     loki-batch-size: "400"
    #     loki-retries: "5"
    #     loki-timeout: "2s"
    #     keep-file: "true"
    #     loki-external-labels: "service=frontend,env=production"
    #     loki-external-labels: "service=frontend,env=production"
